<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <main>
        <div class="container">
            <h1>Age Calculator</h1>
            <input type="date" id="dateField">
            <button class="calculatebtn">Calculate Age</button>
            <p class="showAge"><i>you are <span class="calculatedAge">-</span> years old</i></p>
        </div>
    </main>

    <script src="calculator.js"></script>
</body>
</html>
