<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniNotes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main">
        <div class="container">
            <div class="upperDiv">
                <h1 id="heading">MiniNotes</h1>
                <p>Keep your thoughts organized and accessible.</p>
                <div class="inputFields">
                    <input id="txtField" placeholder="write something quick to do later">
                    <button class="addbtn"> + Add Note </button>
                </div>
            </div>
            <div class="lowerDiv">
                <div class="boxs"></div>
                <div class="boxs"></div>
                <div class="boxs"></div>
            </div>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
