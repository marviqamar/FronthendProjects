<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main">
        <div class="container">
            <h2>Word Counter</h2>
            <textarea id="txtField" rows="8" cols="34"></textarea>
            <p class="words">Words : <span id="wordCount">0</span></p>
            <p class="chars">Characters : <span id="charCount">0</span></p>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
